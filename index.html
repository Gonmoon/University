<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search with OMDb API</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
</head>
<body>
    <header class="header">
        <h1>OMDb</h1>
        <p>The Open Movie Database</p>
    </header>
    <div class="container">
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Search for movies..." id="searchInput">
            <button class="search-button" id="searchButton">Search</button>
        </div>
        <div class="sort-controls">
            <select id="sortBy" class="sort-select">
                <option value="">Sort by...</option>
                <option value="title-asc">Title (A-Z)</option>
                <option value="title-desc">Title (Z-A)</option>
                <option value="year-asc">Year (Oldest first)</option>
                <option value="year-desc">Year (Newest first)</option>
            </select>
        </div>
        <div class="loader" id="loader"></div>
        <div class="error-message" id="errorMessage"></div>
        <div class="movies-container" id="moviesContainer"></div>
        <button class="load-more" id="loadMore" disabled>Load More</button>
    </div>
    <footer class="footer">
        <p>Created on June 2025</p>
        <a href="https://github.com/Gonmoon" target="_blank">GitHub</a>
    </footer>
</body>
</html>
